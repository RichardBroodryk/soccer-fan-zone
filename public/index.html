<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>React App</title>

    <!-- Google AdSense Script -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1802119108740811"
      crossorigin="anonymous"
    ></script>

    <!-- ✅ Paddle Billing v2 Loader (RAZ) -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
      window.Paddle &&
        window.Paddle.Initialize({
          token: "live_2bfb17d9fcf0a48f769b6021d1b",
        });

      // ✅ AUTO-OPEN CHECKOUT WHEN BACKEND REDIRECTS
      (function () {
        try {
          const params = new URLSearchParams(window.location.search);
          const txn = params.get("_ptxn");

          if (txn && window.Paddle) {
            console.log("RAZ → Opening Paddle checkout:", txn);

            window.Paddle.Checkout.open({
              transactionId: txn,
            });
          }
        } catch (err) {
          console.error("RAZ Paddle auto-open failed:", err);
        }
      })();
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
